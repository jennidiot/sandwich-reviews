<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Sandwich Verdict</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #F5EDD6;
    --mustard: #E8A020;
    --brown: #3D1C02;
    --tan: #C4955A;
    --rust: #C0440C;
    --light-tan: #EDD9B0;
    --paper: #FAF4E6;
    --ink: #2A1400;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background-color: var(--cream);
    font-family: 'DM Mono', monospace;
    color: var(--ink);
    min-height: 100vh;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(61,28,2,0.06) 39px, rgba(61,28,2,0.06) 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(61,28,2,0.03) 39px, rgba(61,28,2,0.03) 40px);
  }

  header {
    background: var(--brown);
    padding: 20px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 4px solid var(--mustard);
    position: sticky;
    top: 0;
    z-index: 100;
    gap: 16px;
    flex-wrap: wrap;
  }

  .logo { font-family: 'Playfair Display', serif; font-size: 1.8rem; font-weight: 900; color: var(--cream); letter-spacing: -0.5px; }
  .logo span { color: var(--mustard); font-style: italic; }
  .header-tagline { font-size: 0.65rem; color: var(--tan); letter-spacing: 2px; text-transform: uppercase; }
  .header-right { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }

  .sync-status {
    font-size: 0.6rem; letter-spacing: 1px; text-transform: uppercase;
    padding: 5px 10px; border-radius: 2px; border: 1.5px solid;
    display: flex; align-items: center; gap: 6px;
  }
  .sync-status.connected    { color: #7BC47F; border-color: rgba(123,196,127,0.3); }
  .sync-status.disconnected { color: var(--tan); border-color: rgba(196,149,90,0.3); }
  .sync-status.syncing      { color: var(--mustard); border-color: rgba(232,160,32,0.3); }
  .sync-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
  .sync-status.syncing .sync-dot { animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.2} }

  nav { display: flex; gap: 10px; }
  .nav-btn {
    font-family: 'DM Mono', monospace; font-size: 0.7rem; letter-spacing: 1.5px;
    text-transform: uppercase; padding: 8px 16px; border-radius: 2px;
    cursor: pointer; transition: all 0.2s; border: 1.5px solid;
  }
  .nav-btn.active, .nav-btn:hover { background: var(--mustard); color: var(--brown); border-color: var(--mustard); }
  .nav-btn:not(.active) { background: transparent; color: var(--cream); border-color: rgba(245,237,214,0.3); }

  main { max-width: 1100px; margin: 0 auto; padding: 40px 24px; }

  .view { display: none; }
  .view.active { display: block; }

  .section-title { font-family: 'Playfair Display', serif; font-size: 2.2rem; font-weight: 900; color: var(--brown); margin-bottom: 6px; }
  .section-sub { font-size: 0.7rem; color: var(--tan); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 32px; }

  .shop-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }

  .shop-card {
    background: var(--paper); border: 1.5px solid var(--light-tan); border-radius: 4px;
    padding: 24px; position: relative; cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s; overflow: hidden;
  }
  .shop-card::before { content:''; position:absolute; top:0;left:0;right:0; height:4px; background:var(--mustard); }
  .shop-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(61,28,2,0.12); }

  .shop-rank { font-family:'Playfair Display',serif; font-size:3rem; font-weight:900; color:var(--light-tan); position:absolute; top:8px;right:16px; line-height:1; }
  .shop-name { font-family:'Playfair Display',serif; font-size:1.25rem; font-weight:700; color:var(--brown); margin-bottom:4px; padding-right:40px; }
  .shop-location { font-size:0.65rem; color:var(--tan); letter-spacing:1.5px; text-transform:uppercase; margin-bottom:16px; }

  .overall-score { display:flex; align-items:baseline; gap:6px; margin-bottom:16px; }
  .score-big { font-family:'Playfair Display',serif; font-size:2.5rem; font-weight:900; color:var(--rust); line-height:1; }
  .score-denom { font-size:0.75rem; color:var(--tan); }

  .mini-bars { display:flex; flex-direction:column; gap:6px; }
  .mini-bar-row { display:flex; align-items:center; gap:8px; }
  .mini-bar-label { font-size:0.6rem; color:var(--tan); width:110px; letter-spacing:0.5px; flex-shrink:0; }
  .mini-bar-track { flex:1; height:4px; background:var(--light-tan); border-radius:2px; overflow:hidden; }
  .mini-bar-fill { height:100%; background:var(--mustard); border-radius:2px; transition:width 0.6s ease; }
  .mini-bar-val { font-size:0.6rem; color:var(--brown); width:20px; text-align:right; }

  .review-count { margin-top:14px; padding-top:12px; border-top:1px dashed var(--light-tan); font-size:0.65rem; color:var(--tan); letter-spacing:1px; }
  .card-actions { display:flex; gap:8px; margin-top:14px; }

  .btn-sm { font-family:'DM Mono',monospace; font-size:0.62rem; letter-spacing:1px; text-transform:uppercase; padding:6px 12px; border-radius:2px; cursor:pointer; border:1.5px solid; transition:all 0.15s; }
  .btn-primary { background:var(--brown); color:var(--cream); border-color:var(--brown); }
  .btn-primary:hover { background:var(--rust); border-color:var(--rust); }
  .btn-ghost { background:transparent; color:var(--brown); border-color:var(--light-tan); }
  .btn-ghost:hover { border-color:var(--tan); }
  .btn-sm:disabled, .btn-large:disabled { opacity:0.45; cursor:not-allowed; }

  .empty-state { grid-column:1/-1; text-align:center; padding:80px 20px; color:var(--tan); }
  .empty-icon { font-size:4rem; margin-bottom:16px; }
  .empty-state h3 { font-family:'Playfair Display',serif; font-size:1.5rem; color:var(--brown); margin-bottom:8px; }

  /* ── SETTINGS ── */
  .form-card { background:var(--paper); border:1.5px solid var(--light-tan); border-radius:4px; padding:40px; max-width:620px; margin:0 auto; }
  .field { margin-bottom:24px; }
  label { display:block; font-size:0.65rem; letter-spacing:2px; text-transform:uppercase; color:var(--tan); margin-bottom:8px; }
  input[type="text"] { width:100%; background:var(--cream); border:1.5px solid var(--light-tan); border-radius:2px; padding:10px 14px; font-family:'DM Mono',monospace; font-size:0.85rem; color:var(--ink); outline:none; transition:border-color 0.2s; }
  input[type="text"]:focus { border-color:var(--mustard); }
  .btn-large { width:100%; font-family:'DM Mono',monospace; font-size:0.75rem; letter-spacing:2px; text-transform:uppercase; padding:14px; border-radius:2px; cursor:pointer; border:none; background:var(--brown); color:var(--cream); transition:background 0.2s; margin-top:8px; }
  .btn-large:hover:not(:disabled) { background:var(--rust); }
  .btn-row { display:flex; gap:10px; }
  .btn-row .btn-large { margin-top:0; }

  .setup-instructions {
    background: rgba(61,28,2,0.05);
    border: 1.5px solid var(--light-tan);
    border-radius: 4px;
    padding: 20px 24px;
    margin-bottom: 28px;
    font-size: 0.72rem;
    line-height: 1.9;
    color: var(--ink);
  }
  .setup-instructions strong { color: var(--brown); }
  .setup-instructions code { background: var(--light-tan); padding: 1px 5px; border-radius: 2px; font-family: 'DM Mono', monospace; font-size: 0.68rem; }
  .setup-instructions a { color: var(--rust); }

  /* ── MODAL ── */
  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(61,28,2,0.6); z-index:200; align-items:center; justify-content:center; padding:20px; }
  .modal-overlay.open { display:flex; }
  .modal { background:var(--paper); border-radius:4px; border:1.5px solid var(--light-tan); max-width:560px; width:100%; max-height:90vh; overflow-y:auto; padding:36px; position:relative; animation:slideUp 0.25s ease; }
  @keyframes slideUp { from{transform:translateY(20px);opacity:0} to{transform:translateY(0);opacity:1} }
  .modal-close { position:absolute; top:16px;right:20px; background:none;border:none; font-size:1.2rem;cursor:pointer; color:var(--tan);line-height:1; }
  .modal-close:hover { color:var(--rust); }
  .modal-title { font-family:'Playfair Display',serif; font-size:1.5rem; font-weight:700; color:var(--brown); margin-bottom:4px; }
  .modal-sub { font-size:0.65rem; color:var(--tan); letter-spacing:2px; text-transform:uppercase; margin-bottom:28px; }
  .criteria-list { display:flex; flex-direction:column; gap:20px; margin-bottom:28px; }
  .criterion-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
  .criterion-name { font-size:0.75rem; letter-spacing:1px; text-transform:uppercase; color:var(--brown); font-weight:500; }
  .criterion-score { font-family:'Playfair Display',serif; font-size:1.4rem; font-weight:700; color:var(--rust); min-width:40px; text-align:right; }
  .star-row { display:flex; gap:8px; }
  .star-btn { background:none;border:none;cursor:pointer; font-size:1.6rem;line-height:1; transition:transform 0.1s; filter:grayscale(1) opacity(0.3); }
  .star-btn.lit { filter:none; }
  .star-btn:hover { transform:scale(1.2); }
  .notes-field { margin-bottom:24px; }
  textarea { width:100%; background:var(--cream); border:1.5px solid var(--light-tan); border-radius:2px; padding:10px 14px; font-family:'DM Mono',monospace; font-size:0.8rem; color:var(--ink); outline:none; resize:vertical; min-height:80px; transition:border-color 0.2s; }
  textarea:focus { border-color:var(--mustard); }

  /* ── DETAIL ── */
  .detail-header { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:32px; flex-wrap:wrap; gap:16px; }
  .detail-title { font-family:'Playfair Display',serif; font-size:2.5rem; font-weight:900; color:var(--brown); margin-bottom:4px; }
  .detail-loc { font-size:0.7rem; color:var(--tan); letter-spacing:2px; text-transform:uppercase; }
  .detail-score-block { background:var(--brown); color:var(--cream); padding:20px 28px; border-radius:4px; text-align:center; }
  .detail-score-num { font-family:'Playfair Display',serif; font-size:3.5rem; font-weight:900; color:var(--mustard); line-height:1; }
  .detail-score-label { font-size:0.6rem; letter-spacing:2px; text-transform:uppercase; color:var(--tan); margin-top:4px; }
  .detail-criteria { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:16px; margin-bottom:40px; }
  .crit-tile { background:var(--paper); border:1.5px solid var(--light-tan); border-radius:4px; padding:18px; }
  .crit-tile-name { font-size:0.6rem; letter-spacing:1.5px; text-transform:uppercase; color:var(--tan); margin-bottom:10px; }
  .crit-tile-score { font-family:'Playfair Display',serif; font-size:2rem; font-weight:700; color:var(--rust); line-height:1; margin-bottom:8px; }
  .bar-track { height:6px; background:var(--light-tan); border-radius:3px; overflow:hidden; }
  .bar-fill { height:100%; background:var(--mustard); border-radius:3px; }
  .reviews-section-title { font-family:'Playfair Display',serif; font-size:1.4rem; font-weight:700; color:var(--brown); margin-bottom:16px; padding-bottom:12px; border-bottom:1.5px solid var(--light-tan); }
  .review-list { display:flex; flex-direction:column; gap:16px; }
  .review-item { background:var(--paper); border:1.5px solid var(--light-tan); border-radius:4px; padding:20px; }
  .review-item-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; flex-wrap:wrap; gap:8px; }
  .review-date { font-size:0.65rem; color:var(--tan); letter-spacing:1px; }
  .review-overall-badge { background:var(--brown); color:var(--mustard); font-family:'Playfair Display',serif; font-weight:700; font-size:0.9rem; padding:4px 10px; border-radius:2px; }
  .review-scores-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:12px; }
  .rs-item { font-size:0.62rem; color:var(--tan); }
  .rs-item strong { color:var(--brown); display:block; font-size:0.8rem; font-family:'Playfair Display',serif; }
  .review-notes { font-size:0.75rem; color:var(--ink); font-style:italic; border-top:1px dashed var(--light-tan); padding-top:12px; margin-top:4px; }

  .back-btn { display:inline-flex; align-items:center; gap:6px; font-size:0.65rem; letter-spacing:1.5px; text-transform:uppercase; color:var(--tan); background:none; border:none; cursor:pointer; margin-bottom:28px; padding:0; transition:color 0.15s; }
  .back-btn:hover { color:var(--brown); }

  .sort-bar { display:flex; gap:8px; align-items:center; margin-bottom:24px; flex-wrap:wrap; }
  .sort-label { font-size:0.65rem; letter-spacing:1.5px; color:var(--tan); text-transform:uppercase; }
  .sort-btn { font-family:'DM Mono',monospace; font-size:0.62rem; letter-spacing:1px; text-transform:uppercase; padding:5px 10px; border-radius:2px; cursor:pointer; border:1.5px solid var(--light-tan); background:transparent; color:var(--brown); transition:all 0.15s; }
  .sort-btn.active { background:var(--mustard); border-color:var(--mustard); color:var(--brown); }
  .sort-btn:hover:not(.active) { border-color:var(--tan); }

  .toast { position:fixed; bottom:28px;right:28px; background:var(--brown); color:var(--cream); padding:12px 20px; border-radius:4px; border-left:4px solid var(--mustard); font-size:0.75rem; letter-spacing:0.5px; z-index:500; transform:translateY(80px); opacity:0; transition:all 0.3s ease; max-width:340px; }
  .toast.show { transform:translateY(0); opacity:1; }
  .toast.error { border-left-color: var(--rust); }

  .loading-overlay { display:none; position:fixed; inset:0; background:rgba(61,28,2,0.45); z-index:300; align-items:center; justify-content:center; }
  .loading-overlay.open { display:flex; }
  .loading-box { background:var(--paper); border:1.5px solid var(--light-tan); border-radius:4px; padding:28px 40px; text-align:center; }
  .loading-spinner { font-size:2.2rem; animation:spin 1s linear infinite; display:block; margin-bottom:12px; }
  @keyframes spin { to{transform:rotate(360deg)} }
  .loading-text { font-size:0.72rem; color:var(--tan); letter-spacing:1px; }
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">The Sandwich <span>Verdict</span></div>
    <div class="header-tagline">Independent Sandwich Intelligence</div>
  </div>
  <div class="header-right">
    <div class="sync-status disconnected" id="sync-status">
      <div class="sync-dot"></div>
      <span id="sync-label">Not connected</span>
    </div>
    <nav>
      <button class="nav-btn active" onclick="showView('leaderboard')">Rankings</button>
      <button class="nav-btn" onclick="showView('add-shop')">+ Add Shop</button>
    </nav>
  </div>
</header>

<main>

  <!-- LEADERBOARD -->
  <div class="view active" id="view-leaderboard">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:16px;margin-bottom:8px;">
      <div>
        <h1 class="section-title">Sandwich Rankings</h1>
        <p class="section-sub">Ranked by community score</p>
      </div>
      <button class="btn-sm btn-ghost" onclick="syncFromGitHub(true)" style="margin-top:10px;">↻ Refresh</button>
    </div>
    <div class="sort-bar">
      <span class="sort-label">Sort by:</span>
      <button class="sort-btn active" onclick="setSort('overall')">Overall</button>
      <button class="sort-btn" onclick="setSort('bread')">Bread</button>
      <button class="sort-btn" onclick="setSort('filling')">Filling</button>
      <button class="sort-btn" onclick="setSort('ratio')">F/B Ratio</button>
      <button class="sort-btn" onclick="setSort('value')">Value</button>
      <button class="sort-btn" onclick="setSort('allergy')">Allergy</button>
      <button class="sort-btn" onclick="setSort('reviews')">Most Reviewed</button>
    </div>
    <div class="shop-grid" id="shop-grid"></div>
  </div>

  <!-- ADD SHOP -->
  <div class="view" id="view-add-shop">
    <h1 class="section-title">Add a Shop</h1>
    <p class="section-sub">Register a new sandwich establishment</p>
    <div class="form-card">
      <div class="field">
        <label>Shop Name</label>
        <input type="text" id="new-shop-name" placeholder="e.g. The Earl of Sandwich">
      </div>
      <div class="field">
        <label>Location / Address</label>
        <input type="text" id="new-shop-location" placeholder="e.g. 14 Bread Street, London">
      </div>
      <button class="btn-large" id="add-shop-btn" onclick="addShop()">Register Shop</button>
    </div>
  </div>


  <!-- DETAIL -->
  <div class="view" id="view-detail">
    <button class="back-btn" onclick="showView('leaderboard')">← Back to Rankings</button>
    <div id="detail-content"></div>
  </div>

</main>

<!-- REVIEW MODAL -->
<div class="modal-overlay" id="review-modal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-title" id="modal-shop-name"></div>
    <div class="modal-sub">Submit your verdict</div>
    <div class="criteria-list" id="criteria-list"></div>
    <div class="notes-field">
      <label>Tasting Notes <span style="opacity:0.5;font-size:0.6rem;">(optional)</span></label>
      <textarea id="review-notes" placeholder="Describe your experience…"></textarea>
    </div>
    <button class="btn-large" id="submit-review-btn" onclick="submitReview()">Submit Verdict</button>
  </div>
</div>

<!-- LOADING -->
<div class="loading-overlay" id="loading-overlay">
  <div class="loading-box">
    <span class="loading-spinner">🥪</span>
    <div class="loading-text" id="loading-text">Syncing with GitHub…</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─────────────────────────────────────────────
//  CONSTANTS
// ─────────────────────────────────────────────
const REVIEWS_FILE = 'reviews.json';
const HTML_FILE    = 'sandwich-reviews.html';

const CRITERIA = [
  { key:'bread',   label:'Bread Quality',          emoji:'🍞' },
  { key:'filling', label:'Filling',                 emoji:'🥩' },
  { key:'ratio',   label:'Filling to Bread Ratio',  emoji:'⚖️' },
  { key:'value',   label:'Value for Money',          emoji:'💰' },
  { key:'allergy', label:'Allergy Control',          emoji:'🛡️' },
  { key:'overall', label:'Overall Score',            emoji:'⭐' },
];

// ─────────────────────────────────────────────
//  SHOPS DATA  (written back to this file by addShop)
// ─────────────────────────────────────────────
// @@SHOPS_START@@
let shops = [];
// @@SHOPS_END@@

// ─────────────────────────────────────────────
//  STATE  — no localStorage anywhere
// ─────────────────────────────────────────────
let reviews         = [];
let currentSort     = 'overall';
let reviewingShopId = null;
let pendingRatings  = {};
let reviewsSha      = null; // GitHub blob SHA for reviews.json

// ─────────────────────────────────────────────
//  CONFIG  — hard-coded, no settings screen needed
// ─────────────────────────────────────────────
const GH_TOKEN  = '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';
const GH_OWNER  = 'jennidiot';
const GH_REPO   = 'sandwich-reviews';
const GH_BRANCH = 'main';

function getConfig() {
  return { token: GH_TOKEN, owner: GH_OWNER, repo: GH_REPO, branch: GH_BRANCH };
}
function isConfigured() { return true; }

// ─────────────────────────────────────────────
//  GITHUB API
// ─────────────────────────────────────────────

// Safe UTF-8 base64 decode (handles emoji and accented chars in review notes)
function b64decode(str) {
  return decodeURIComponent(
    atob(str.replace(/\n/g, ''))
      .split('')
      .map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2))
      .join('')
  );
}

async function ghRequest(path, method = 'GET', body = null) {
  const { token, owner, repo } = getConfig();
  const url  = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;
  const opts = {
    method,
    headers: {
      'Authorization': `token ${token}`,
      'Accept':        'application/vnd.github.v3+json',
      'Content-Type':  'application/json',
    },
  };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(url, opts);
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.message || `GitHub API ${res.status}`);
  }
  return res.status === 204 ? null : res.json();
}

// ─────────────────────────────────────────────
//  SYNC — read reviews.json from GitHub
// ─────────────────────────────────────────────
async function syncFromGitHub(showLoader = false) {
  if (showLoader) showLoading('Fetching latest data…');
  setSyncStatus('syncing', 'Syncing…');
  try {
    const data = await ghRequest(REVIEWS_FILE);
    const raw  = (data.content || '').replace(/\n/g, '');
    let content = { reviews: [] };
    if (raw) {
      try { content = JSON.parse(b64decode(raw)); }
      catch (e) { console.warn('reviews.json parse failed, treating as empty:', e); }
    }
    reviews    = content.reviews || [];
    reviewsSha = data.sha;
    setSyncStatus('connected', 'Synced ✓');
    renderLeaderboard();
  } catch (e) {
    const msg = (e.message || '').toLowerCase();
    if (msg.includes('not found') || msg.includes('404')) {
      // reviews.json doesn't exist yet — create it now
      reviews = []; reviewsSha = null;
      try {
        await pushReviews('Initialise reviews.json');
        setSyncStatus('connected', 'Synced ✓');
      } catch (e2) {
        setSyncStatus('disconnected', 'Auth error');
        showToast('Could not write to repo — check your token has repo scope.', true);
      }
      renderLeaderboard();
    } else {
      setSyncStatus('disconnected', 'Sync failed');
      showToast('GitHub sync failed: ' + e.message, true);
      renderLeaderboard();
    }
  } finally {
    hideLoading();
  }
}

// ─────────────────────────────────────────────
//  PUSH reviews.json
// ─────────────────────────────────────────────
async function pushReviews(commitMessage) {
  const payload = { reviews, lastUpdated: new Date().toISOString() };
  const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(payload, null, 2))));
  const body    = { message: commitMessage, content: encoded, branch: getConfig().branch };
  if (reviewsSha) body.sha = reviewsSha;
  const res  = await ghRequest(REVIEWS_FILE, 'PUT', body);
  reviewsSha = res.content.sha;
}

// ─────────────────────────────────────────────
//  PUSH shops back into sandwich-reviews.html
// ─────────────────────────────────────────────
async function pushShopsToHtml(commitMessage) {
  const { owner, repo, branch, token } = getConfig();

  // Always fetch fresh to get the current SHA (avoids conflicts)
  const fileData    = await ghRequest(HTML_FILE);
  const currentHtml = b64decode(fileData.content);
  const htmlSha     = fileData.sha;

  const sentinel = /\/\/ @@SHOPS_START@@[\s\S]*?\/\/ @@SHOPS_END@@/;
  if (!sentinel.test(currentHtml)) {
    throw new Error('Sentinel markers not found in HTML — cannot patch shops.');
  }

  const shopJson    = JSON.stringify(shops, null, 2)
                        .split('\n').map((l, i) => i === 0 ? l : '  ' + l).join('\n');
  const newBlock    = `// @@SHOPS_START@@\nlet shops = ${shopJson};\n// @@SHOPS_END@@`;
  const updatedHtml = currentHtml.replace(sentinel, newBlock);
  const encoded     = btoa(unescape(encodeURIComponent(updatedHtml)));

  const res = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${HTML_FILE}`, {
    method:  'PUT',
    headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
    body:    JSON.stringify({ message: commitMessage, content: encoded, branch, sha: htmlSha }),
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.message || `GitHub API ${res.status}`);
  }
}

// ─────────────────────────────────────────────
//  SAVE HELPERS
// ─────────────────────────────────────────────
async function saveReviews(commitMsg) {
  await pushReviews(commitMsg);
}
async function saveShops(commitMsg) {
  await pushShopsToHtml(commitMsg);
}

// ─────────────────────────────────────────────
//  HELPERS
// ─────────────────────────────────────────────
function avg(shopId, key) {
  const rs = reviews.filter(r => r.shopId === shopId);
  if (!rs.length) return null;
  return rs.reduce((s, r) => s + (r[key] || 0), 0) / rs.length;
}
function shopAvgs(shopId) {
  const out = {};
  CRITERIA.forEach(c => { out[c.key] = avg(shopId, c.key); });
  return out;
}
function reviewCount(shopId) { return reviews.filter(r => r.shopId === shopId).length; }
function uid() { return 'x' + Math.random().toString(36).slice(2,10); }
function fmt(n) { return n == null ? '—' : n.toFixed(1); }

// ─────────────────────────────────────────────
//  UI HELPERS
// ─────────────────────────────────────────────
function setSyncStatus(state, label) {
  document.getElementById('sync-status').className = 'sync-status ' + state;
  document.getElementById('sync-label').textContent = label;
}
function showLoading(msg) {
  document.getElementById('loading-text').textContent = msg || 'Syncing…';
  document.getElementById('loading-overlay').classList.add('open');
}
function hideLoading() { document.getElementById('loading-overlay').classList.remove('open'); }
function showToast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className   = 'toast show' + (isError ? ' error' : '');
  setTimeout(() => { t.className = 'toast'; }, 4000);
}

// ─────────────────────────────────────────────
//  SORT
// ─────────────────────────────────────────────
function setSort(key) {
  currentSort = key;
  document.querySelectorAll('.sort-btn').forEach(b => {
    const t = b.textContent.trim().toLowerCase();
    b.classList.toggle('active', t === key || (key==='ratio'&&t==='f/b ratio') || (key==='reviews'&&t==='most reviewed'));
  });
  renderLeaderboard();
}
function sortedShops() {
  return [...shops].sort((a, b) => {
    if (currentSort === 'reviews') return reviewCount(b.id) - reviewCount(a.id);
    const av = avg(a.id, currentSort);
    const bv = avg(b.id, currentSort);
    if (av==null && bv==null) return 0;
    if (av==null) return 1;
    if (bv==null) return -1;
    return bv - av;
  });
}

// ─────────────────────────────────────────────
//  VIEWS
// ─────────────────────────────────────────────
function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  if (name === 'leaderboard') { document.querySelectorAll('.nav-btn')[0].classList.add('active'); renderLeaderboard(); }
  if (name === 'add-shop')    { document.querySelectorAll('.nav-btn')[1].classList.add('active'); }
}

// ─────────────────────────────────────────────
//  LEADERBOARD
// ─────────────────────────────────────────────
function renderLeaderboard() {
  const grid   = document.getElementById('shop-grid');
  const sorted = sortedShops();
  if (!sorted.length) {
    grid.innerHTML = `<div class="empty-state"><div class="empty-icon">🥪</div><h3>No shops yet</h3><p>Add the first sandwich shop to get started.</p></div>`;
    return;
  }
  grid.innerHTML = sorted.map((shop, i) => {
    const avgs  = shopAvgs(shop.id);
    const count = reviewCount(shop.id);
    const bars  = CRITERIA.filter(c => c.key !== 'overall').map(c => {
      const v = avgs[c.key];
      return `<div class="mini-bar-row">
        <div class="mini-bar-label">${c.label}</div>
        <div class="mini-bar-track"><div class="mini-bar-fill" style="width:${v?(v/5*100):0}%"></div></div>
        <div class="mini-bar-val">${fmt(v)}</div>
      </div>`;
    }).join('');
    return `<div class="shop-card" onclick="showDetail('${shop.id}')">
      <div class="shop-rank">${i+1}</div>
      <div class="shop-name">${shop.name}</div>
      <div class="shop-location">${shop.location}</div>
      <div class="overall-score">
        <div class="score-big">${fmt(avgs.overall)}</div>
        <div class="score-denom">/ 5 overall</div>
      </div>
      <div class="mini-bars">${bars}</div>
      <div class="review-count">${count} ${count===1?'review':'reviews'}</div>
      <div class="card-actions">
        <button class="btn-sm btn-primary" onclick="event.stopPropagation();openReviewModal('${shop.id}')">+ Review</button>
        <button class="btn-sm btn-ghost"   onclick="event.stopPropagation();showDetail('${shop.id}')">Details</button>
      </div>
    </div>`;
  }).join('');
}

// ─────────────────────────────────────────────
//  DETAIL
// ─────────────────────────────────────────────
function showDetail(shopId) {
  const shop = shops.find(s => s.id === shopId);
  if (!shop) return;
  const avgs = shopAvgs(shopId);
  const rs   = reviews.filter(r => r.shopId === shopId).sort((a,b) => b.date.localeCompare(a.date));
  const critTiles = CRITERIA.map(c => {
    const v = avgs[c.key];
    return `<div class="crit-tile">
      <div class="crit-tile-name">${c.emoji} ${c.label}</div>
      <div class="crit-tile-score">${fmt(v)}<span style="font-size:1rem;color:var(--tan)">/5</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${v?(v/5*100):0}%"></div></div>
    </div>`;
  }).join('');
  const reviewItems = rs.length ? rs.map(r => {
    const scoreGrid = CRITERIA.filter(c => c.key!=='overall').map(c =>
      `<div class="rs-item"><strong>${r[c.key]??'—'}/5</strong>${c.label}</div>`
    ).join('');
    return `<div class="review-item">
      <div class="review-item-header">
        <div class="review-date">${new Date(r.date).toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'})}</div>
        <div class="review-overall-badge">Overall: ${r.overall}/5</div>
      </div>
      <div class="review-scores-grid">${scoreGrid}</div>
      ${r.notes?`<div class="review-notes">"${r.notes}"</div>`:''}
    </div>`;
  }).join('') : `<p style="color:var(--tan);font-size:0.8rem;">No reviews yet. Be the first!</p>`;
  document.getElementById('detail-content').innerHTML = `
    <div class="detail-header">
      <div>
        <div class="detail-title">${shop.name}</div>
        <div class="detail-loc">📍 ${shop.location}</div>
      </div>
      <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap;">
        <div class="detail-score-block">
          <div class="detail-score-num">${fmt(avgs.overall)}</div>
          <div class="detail-score-label">Overall / 5</div>
        </div>
        <button class="btn-sm btn-primary" style="padding:10px 16px;" onclick="openReviewModal('${shop.id}')">+ Write Review</button>
      </div>
    </div>
    <div class="detail-criteria">${critTiles}</div>
    <div class="reviews-section-title">All Reviews (${rs.length})</div>
    <div class="review-list">${reviewItems}</div>`;
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-detail').classList.add('active');
  window.scrollTo(0,0);
}

// ─────────────────────────────────────────────
//  ADD SHOP
// ─────────────────────────────────────────────
async function addShop() {
  const name     = document.getElementById('new-shop-name').value.trim();
  const location = document.getElementById('new-shop-location').value.trim();
  if (!name) { showToast('Please enter a shop name.', true); return; }
  const btn = document.getElementById('add-shop-btn');
  btn.disabled = true; btn.textContent = 'Saving…';
  shops.push({ id:uid(), name, location: location || 'Location unknown' });
  try {
    showLoading('Registering shop…');
    await saveShops(`Add shop: ${name}`);
    document.getElementById('new-shop-name').value    = '';
    document.getElementById('new-shop-location').value = '';
    showToast('Shop registered — written to HTML file!');
    showView('leaderboard');
  } catch(e) {
    showToast('GitHub sync failed: ' + e.message, true);
    shops.pop(); // roll back the optimistic add
  } finally {
    hideLoading();
    btn.disabled = false; btn.textContent = 'Register Shop';
  }
}

// ─────────────────────────────────────────────
//  REVIEW MODAL
// ─────────────────────────────────────────────
function openReviewModal(shopId) {
  const shop = shops.find(s => s.id === shopId);
  reviewingShopId = shopId;
  pendingRatings  = {};
  document.getElementById('modal-shop-name').textContent    = shop.name;
  document.getElementById('review-notes').value             = '';
  document.getElementById('submit-review-btn').disabled     = false;
  document.getElementById('submit-review-btn').textContent  = 'Submit Verdict';
  document.getElementById('criteria-list').innerHTML = CRITERIA.map(c => `
    <div class="criterion">
      <div class="criterion-header">
        <div class="criterion-name">${c.emoji} ${c.label}</div>
        <div class="criterion-score" id="score-${c.key}">—</div>
      </div>
      <div class="star-row" id="stars-${c.key}">
        ${[1,2,3,4,5].map(n => `<button class="star-btn" data-key="${c.key}" data-val="${n}" onclick="setRating('${c.key}',${n})">⭐</button>`).join('')}
      </div>
    </div>`).join('');
  document.getElementById('review-modal').classList.add('open');
}
function setRating(key, val) {
  pendingRatings[key] = val;
  document.getElementById(`score-${key}`).textContent = val + '/5';
  document.querySelectorAll(`#stars-${key} .star-btn`).forEach(b => {
    b.classList.toggle('lit', parseInt(b.dataset.val) <= val);
  });
}
function closeModal() {
  document.getElementById('review-modal').classList.remove('open');
  reviewingShopId = null;
}
async function submitReview() {
  const missing = CRITERIA.filter(c => !pendingRatings[c.key]);
  if (missing.length) { showToast('Please rate: ' + missing.map(c=>c.label).join(', '), true); return; }
  const btn = document.getElementById('submit-review-btn');
  btn.disabled = true; btn.textContent = 'Submitting…';
  const notes    = document.getElementById('review-notes').value.trim();
  const review   = { id:uid(), shopId:reviewingShopId, date:new Date().toISOString().slice(0,10), notes, ...pendingRatings };
  const shopName = shops.find(s => s.id === reviewingShopId)?.name || 'shop';
  const sid      = reviewingShopId;
  reviews.push(review);
  try {
    showLoading('Saving verdict…');
    await saveReviews(`Review: ${shopName}`);
    closeModal();
    showToast('Verdict submitted!');
    if (document.getElementById('view-leaderboard').classList.contains('active')) renderLeaderboard();
    if (document.getElementById('view-detail').classList.contains('active')) showDetail(sid);
  } catch(e) {
    showToast('GitHub sync failed: ' + e.message, true);
    reviews.pop(); // roll back
    closeModal();
  } finally {
    hideLoading();
    btn.disabled = false; btn.textContent = 'Submit Verdict';
  }
}

// ─────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────
// shops[] is populated from the embedded @@SHOPS_START@@ block.
// reviews come exclusively from GitHub.
(async function init() {
  await syncFromGitHub(true);
})();
</script>
